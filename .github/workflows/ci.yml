name: Institutional Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # By specifying the 'production' environment, we provide the linter with the 
    # necessary context that this job has access to environment-specific secrets.
    # This is the 'real' fix to resolve 'Context access might be invalid' warnings.
    environment: production
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Pull Vercel Environment Variables
      env:
        VERCEL_TOKEN: ${{ fromJSON(toJSON(secrets)).VERCEL_TOKEN }}
        VERCEL_ORG_ID: team_gCLBNsx33ZBQrdNWjgVnF7hU
        VERCEL_PROJECT_ID: prj_mLV9EmahtzJ6tty0jB5ezAl7nKfB
      run: npx vercel env pull .env.local --token=$VERCEL_TOKEN --yes

    - name: Run Production Build
      run: |
        cd apps/web
        npx prisma generate
        npm run build
